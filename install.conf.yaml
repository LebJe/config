- defaults:
    link:
      relink: true

- clean: ["~", "~/config/"]

- link:
    ~/config: ''
    ~/.zshrc:
    ~/cronFiles:
    ~/.config/nvim/init.vim:
    ~/.config/nvim/coc-settings.json:
    ~/.prettierrc.json:
- shell:
  - 
    command: 'nvim -es -u init.vim -i NONE -c "PlugInstall" -c -c "PlugUpgrade" -c "PlugUpdate" "qa"'
    stdout: true
    stderr: true
  - 
    command: 'bash configureVimspector.sh'
    stdout: true
    stderr: true
