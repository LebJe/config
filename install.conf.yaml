- defaults:
    link:
      relink: true

- clean: ["~", "~/config/"]

- link:
    ~/config: ''
    ~/.zshrc:
    ~/cronFiles:
    ~/.config/nvim/init.vim:
    ~/.config/nvim/coc-settings.json:
    ~/.prettierrc.json:
- shell:
  - 'mkdir -p $HOME/.config/nvim/'
  - 
    command: 'nvim -es --u init.vim i NONE -c "PlugInstall" -c "qa"'
    stdout: true
    stderr: true
  - 
    command: 'bash installVimspector.sh'
    stdout: true
    stderr: true
