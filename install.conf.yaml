- defaults:
    link:
      relink: true

- clean: ["~", "~/config/"]

- link:
    ~/config: ''
    ~/.zshrc:
    ~/cronFiles:
    ~/.config/nvim/init.vim:
    ~/.config/nvim/coc-settings.json:
    ~/.prettierrc.json:
- shell:
  - 'mkdir -p $HOME/.config/nvim/'
  - 'bash installVimPlug.sh'
  - 'rm -rf $HOME/.local/share/nvim/site/pack/vimspector'
  - 'echo ":q" | vim -c ":PlugInstall"'
  - 
    command: 'bash installVimspector.sh'
    stdout: true
    stderr: true
