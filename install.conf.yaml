- defaults:
    link:
      relink: true

- clean: ["~", "~/config/"]

- link:
    ~/config: ''
    ~/.zshrc:
    ~/cronFiles:
    ~/.config/nvim/init.vim:
    ~/.config/nvim/coc-settings.json:
    ~/.prettierrc.json:
- shell:
  - 'mkdir ~/.config/nvim/'
  - './installVimPlug.sh'
  - 'echo ":q" | vim -c ":PlugInstall"'
